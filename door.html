  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.getElementById('door-hanger-form');
      if (!form) return;

      const honeypot = form.querySelector('input[name="botcheck"], input[name="_honey"]');
      if (honeypot) {
        honeypot.value = '';
        honeypot.setAttribute('autocomplete', 'off');
        honeypot.setAttribute('aria-hidden', 'true');
      }

      const redirectField = form.querySelector('input[name="redirect"]');
      const successUrl = form.getAttribute('data-success-url') || (redirectField && redirectField.value) || 'https://a-team-handyman-services.com/pages/thank-you.html';

      form.addEventListener('submit', async function (event) {
        if (honeypot && honeypot.value.trim()) {
          event.preventDefault();
          return;
        }

        event.preventDefault();

        const origin = (window.location && window.location.origin && window.location.origin !== 'null')
          ? window.location.origin.replace(/\/$/, '')
          : 'https://a-team-handyman-services.com';
        const redirectValue = successUrl.startsWith('http')
          ? successUrl
          : origin + successUrl.replace(/^\//, '/');
        if (redirectField) {
          redirectField.value = redirectValue;
        }

        try {
          const formData = new FormData(form);
          if (!formData.get('offer_detail') || !formData.get('offer_terms')) {
            const offers = window.ATeamDiscountOffers || {};
            const offer = offers[formData.get('discount_code')];
            if (offer) {
              formData.set('offer_detail', offer.detail);
              formData.set('offer_terms', offer.terms);
            }
          }
          if (!formData.get('redirect')) {
            formData.append('redirect', redirectValue);
          }
          await fetch(form.action, {
            method: 'POST',
            body: formData
          });
        } catch (err) {
          console.error('Web3Forms submit error', err);
        } finally {
          window.location.href = redirectValue;
        }
      });
    });
  </script>
