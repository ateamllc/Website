  <header id="site-header">
      <div data-include="/pages/partials/nav.html"></div>
  </header>

  <main class="content-sections handyman-lander">
    <section
      class="hero-banner page-hero"
      data-landing-hero
      data-hero-image="/image/IMG_2597.webp"
      data-hero-eyebrow="Provo / Orem / Utah County"
      data-hero-title="Handyman services for punch lists, repairs, and small projects"
      data-hero-subtitle="Reliable help for drywall patches, trim repairs, doors, fixtures, caulking, rental turns, and general home maintenance."
      data-primary-label="Free Estimate"
      data-primary-mobile-label="Estimate"
      data-primary-href="#handyman-estimate-form"
      data-call-label="Call (801) 477-7526"
      data-call-mobile-label="Call"
      data-call-href="tel:+18014777526"
      data-text-label="Text"
      data-text-href="sms:+18014777526"
      data-include="/pages/partials/landing/hero.html">
    </section>

    <section class="trust-strip" aria-label="Handyman service trust points" data-trust-src="/data/landing/handyman-trust.json" data-include="/pages/partials/landing/trust-strip.html"></section>

    <section class="content-section content-with-image">
      <div class="text-block text-left">
        <div
          class="carousel-shell"
          data-carousel-title="Handyman projects"
          data-carousel-label="Handyman project photo"
          data-carousel-rows="2"
          data-carousel-autoscroll="true"
          data-carousel-speed="160s"
          data-carousel-folder="/image/handyman-photos"
          data-carousel-featured-tag="person"
          data-carousel-featured-every="6"
          data-include="/pages/partials/carousel.html">
        </div>
        <div
          data-problem-solution
          data-problem-src="/data/landing/handyman-problems.json"
          data-problem-eyebrow="Your list, handled"
          data-problem-title-start="Problems"
          data-problem-title-end="solutions"
          data-problem-note="Need something else? If it’s not a fit we’ll point you to a trusted trade partner."
          data-primary-label="Send us your list"
          data-primary-href="#handyman-estimate-form"
          data-secondary-label="See all services"
          data-secondary-href="/pages/services.html"
          data-include="/pages/partials/landing/problem-solution.html">
        </div>
      </div>
    </section>

    <section
      class="content-section estimate-photo-section"
      data-estimate-form
      data-form-id="handyman-estimate-form"
      data-track-form="handyman_landing_estimate"
      data-subject="IMPORTANT!! Handyman landing page estimate request"
      data-estimate-eyebrow="Fast estimate"
      data-estimate-title="Share the list and a few photos"
      data-estimate-copy="We use your notes and photos to confirm whether the work fits our scope, whether a visit block or fixed estimate makes sense, and how soon we can schedule."
      data-estimate-note="Phone is used only to call or text about this estimate. No spam."
      data-call-label="Call first"
      data-text-label="Text photos"
      data-include="/pages/partials/landing/estimate-form.html">
    </section>

    <section
      class="content-section review-carousel-section"
      data-review-section
      data-review-eyebrow="Google reviews"
      data-review-title="Homeowners choose us for clean, reliable, high quality work"
      data-review-intro="Rated 5.0 on Google from recent customers. Swipe or scroll through the review highlights."
      data-reviews-src="/data/landing/handyman-reviews.json"
      data-include="/pages/partials/landing/review-carousel.html">
    </section>

    <section
      class="content-section scope-clarity-section"
      data-scope-section
      data-scope-eyebrow="Scope clarity"
      data-scope-title="What we don't do"
      data-scope-intro="In cases like those below (outside our licensing scope), we will refer you to a specialty contractor:"
      data-scope-src="/data/landing/handyman-scope.json"
      data-scope-cta-label="Check if your job fits"
      data-scope-cta-href="#handyman-estimate-form"
      data-include="/pages/partials/landing/scope-clarity.html">
    </section>

    <section
      class="content-section cta-section final-cta-section"
      data-final-cta
      data-final-cta-title="Ready to get started?"
      data-final-cta-copy="Send us your list and photos—our team will confirm scope, timeline, and pricing before we arrive."
      data-secondary-label="Talk with us"
      data-secondary-href="tel:+18014777526"
      data-primary-label="Request a free estimate"
      data-primary-href="#handyman-estimate-form"
      data-include="/pages/partials/landing/final-cta.html">
    </section>

    data-text-label="Text"
    data-text-href="sms:+18014777526"
