<div class="section-inner contact-layout">
  <div class="contact-details">
    <p class="eyebrow" data-estimate-eyebrow>Fast estimate</p>
    <h2 data-estimate-title>Share the list and a few photos</h2>
    <p data-estimate-copy></p>
    <p><strong data-estimate-note>Phone is used only to call or text about this estimate. No spam.</strong></p>
    <div class="section-ctas section-ctas--left">
      <a class="btn btn-outline" data-estimate-call href="tel:+18014777526" data-track-event="click_call" data-track-label="Form section call CTA">Call first</a>
      <a class="btn btn-outline" data-estimate-text href="sms:+18014777526" data-track-event="click_sms" data-track-label="Form section text CTA">Text photos</a>
    </div>
  </div>

  <form action="https://api.web3forms.com/submit" method="post" class="contact-form estimate-form"
    data-require-contact
    data-success-url="https://ateamutah.com/pages/thank-you" autocomplete="on">
    <input type="hidden" name="access_key" value="39bc33a4-e716-468a-aa49-31c3743adbe2">
    <input type="hidden" name="subject" value="A Team Lead | Landing Page Estimate">
    <input type="hidden" name="from_name" value="A Team Property Improvement">
    <input type="hidden" name="form_id" value="landing_page_estimate">
    <input type="hidden" name="form_name" value="Landing Page Estimate">
    <input type="hidden" name="form_source" value="Website landing page">
    <input type="hidden" name="page_url" value="">
    <input type="hidden" name="service_category" value="Unspecified">
    <input type="hidden" name="lead_source" value="website_form">
    <input type="hidden" name="utm_source" value="">
    <input type="hidden" name="utm_medium" value="">
    <input type="hidden" name="utm_campaign" value="">
    <input type="hidden" name="utm_content" value="">
    <input type="hidden" name="utm_term" value="">
    <input type="hidden" name="gclid" value="">
    <input type="hidden" name="gbraid" value="">
    <input type="hidden" name="wbraid" value="">
    <textarea name="starting_text_message" hidden>Hi ____, this is A Team Property Improvement! We got your request for help on your home project. What times this week would work for a quick walkthrough to get a few more details?

You can reply here or call us at (801) 477-7526 with any questions!</textarea>
    <input type="hidden" name="redirect" value="https://ateamutah.com/pages/thank-you">
    <div class="contact-honey" aria-hidden="true" hidden>
      <label data-for="guard">Leave this field empty</label>
      <input data-field="guard" type="text" name="botcheck" tabindex="-1" autocomplete="off" inputmode="none">
    </div>

    <label data-for="first-name">First name</label>
    <input data-field="first-name" name="first_name" autocomplete="given-name" required>

    <label data-for="last-name">Last name</label>
    <input data-field="last-name" name="last_name" autocomplete="family-name" required>

    <label data-for="phone">Phone</label>
    <input data-field="phone" name="phone" autocomplete="tel" inputmode="tel">
    <p class="form-microcopy">Used only to text or call about your estimate.</p>

    <label data-for="email">Email</label>
    <input data-field="email" type="email" name="email" autocomplete="email">

    <label data-for="city">Project city or address</label>
    <input data-field="city" name="project_address" autocomplete="street-address">

    <label data-for="message">What do you need help with?</label>
    <textarea data-field="message" name="project_description" rows="5" placeholder="Example: patch two drywall holes, repair loose baseboard, replace door hardware..." required></textarea>

    <label data-for="timing">Preferred timing</label>
    <select data-field="timing" name="preferred_timeline">
      <option value="">Select one</option>
      <option>This week if available</option>
      <option>Next 1-2 weeks</option>
      <option>This month</option>
      <option>Flexible</option>
    </select>

    <button type="submit" class="btn btn-primary" data-estimate-submit>Submit estimate request</button>
  </form>
</div>
