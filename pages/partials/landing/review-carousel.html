<div class="section-inner">
  <div class="text-block">
    <p class="eyebrow" data-review-eyebrow>Reviews</p>
    <h2 data-review-title>Customers choose us for clean, reliable work</h2>
    <p data-review-intro>Swipe or scroll through recent customer feedback.</p>
  </div>
  <div class="review-carousel-frame">
    <button type="button" class="review-carousel-button review-carousel-button--prev" data-review-carousel-prev aria-label="Previous reviews">
      <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
        <path d="M15 18 9 12l6-6" />
      </svg>
    </button>
    <div class="review-carousel" data-review-carousel-items aria-label="Customer review carousel"></div>
    <button type="button" class="review-carousel-button review-carousel-button--next" data-review-carousel-next aria-label="Next reviews">
      <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
        <path d="m9 18 6-6-6-6" />
      </svg>
    </button>
  </div>
  <div class="section-ctas review-carousel-cta">
    <a class="btn btn-primary" href="/pages/contact" data-review-cta data-track-event="estimate_form_start" data-track-label="Review carousel estimate CTA">Get Free Estimate</a>
  </div>
</div>
