<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="referrer" content="no-referrer">
  <meta name="robots" content="noindex,nofollow,noarchive,noimageindex">
  <title>Lead Submitted | A Team Property Improvement</title>
  <link rel="icon" type="image/x-icon" href="/image/favicon.ico">
  <link href="https://fonts.googleapis.com/css?family=Oswald:400,600,700|Open+Sans:400,600,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body {
      background: #f8fafc;
      color: #172033;
    }

    .submitted-main {
      max-width: 720px;
      margin: 0 auto;
      padding: 1rem;
    }

    .submitted-panel {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 1.25rem;
      margin-top: 1rem;
      box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
    }

    h1,
    h2 {
      font-family: 'Oswald', sans-serif;
      color: #182741;
      line-height: 1.1;
    }

    h1 {
      font-size: clamp(2rem, 10vw, 3.5rem);
      margin-bottom: 0.85rem;
    }

    h2 {
      font-size: 1.45rem;
      margin-bottom: 0.8rem;
    }

    .submitted-intro {
      color: #334155;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .home-steps {
      display: grid;
      gap: 0.75rem;
      list-style: none;
      padding: 0;
      margin-bottom: 1rem;
    }

    .home-steps li {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.65rem;
      align-items: start;
      color: #334155;
      font-weight: 700;
    }

    .step-title {
      display: block;
      color: #182741;
      font-weight: 800;
      text-transform: uppercase;
    }

    .step-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.8rem;
      height: 1.8rem;
      border-radius: 999px;
      background: #f59e0b;
      color: #0f172a;
      font-size: 0.95rem;
      font-weight: 800;
    }

    .submitted-actions {
      display: grid;
      margin: 1rem 0 1.4rem;
    }

    @media (min-width: 560px) {
      .submitted-main {
        padding: 1.25rem;
      }

      .submitted-panel {
        padding: 1.5rem;
      }

      .submitted-actions {
        justify-items: start;
      }
    }
  </style>
</head>

<body>
  <main class="submitted-main">
    <section class="submitted-panel" aria-labelledby="submitted-title">
      <h1 id="submitted-title">Form Submitted, thank you</h1>
      <p class="submitted-intro">Now finish the at-home process. Do not let this lead sit.</p>
      <div class="submitted-actions">
        <a class="btn btn-primary" href="/pages/knocking-rules.html#lead-form">Enter a new lead</a>
      </div>
      <h2>When Home: 1-2-3-4</h2>
      <ol class="home-steps">
        <li>
          <span class="step-number">1</span>
          <span><span class="step-title">Make the Trello card now</span></span>
        </li>
        <li>
          <span class="step-number">2</span>
          <span><span class="step-title">Text within an hour</span></span>
        </li>
        <li>
          <span class="step-number">3</span>
          <span><span class="step-title">Send QBO estimate in <24hrs</span></span>
        </li>
        <li>
          <span class="step-number">4</span>
          <span><span class="step-title">Archive the form email</span></span>
        </li>
      </ol>
    </section>
  </main>
</body>
</html>
