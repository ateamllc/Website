<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T3PJRGP3" height="0" width="0"
          style="display:none;visibility:hidden"></iframe></noscript>

  <header id="site-header">
    <div data-include="/pages/partials/nav.html"></div>
  </header>

  <main class="content-sections maintenance-request-page">
    <section class="maintenance-request-header">
      <div class="maintenance-request-header__media" aria-hidden="true"></div>
      <div class="section-inner maintenance-request-header__inner">
        <div>
          <p class="eyebrow">Property managers</p>
          <h1>Maintenance Request</h1>
          <a href="tel:+18014777526">Call urgent issues: (801) 477-7526</a>
        </div>
        <div class="maintenance-request-header__panel" aria-label="Request routing">
          <span>Intake</span>
          <strong>Maintenance workflow</strong>
        </div>
      </div>
    </section>

    <section class="content-section maintenance-request-form-section" aria-labelledby="maintenance-request-title">
      <div class="section-inner maintenance-request-layout">
        <form id="maintenance-request-form" action="https://api.web3forms.com/submit" method="post" class="contact-form maintenance-request-form"
          data-require-contact
          data-success-url="https://ateamutah.com/pages/thank-you" data-track-form="property_manager_maintenance_request" autocomplete="on">
          <h2 id="maintenance-request-title">Request Details</h2>
          <input type="hidden" name="access_key" value="39bc33a4-e716-468a-aa49-31c3743adbe2">
          <input type="hidden" name="subject" value="A Team Lead | Property Manager Maintenance Request">
          <input type="hidden" name="from_name" value="A Team Property Improvement">
          <input type="hidden" name="form_id" value="property_manager_maintenance_request">
          <input type="hidden" name="form_name" value="Property Manager Maintenance Request">
          <input type="hidden" name="form_source" value="Current property manager maintenance request page">
          <input type="hidden" name="page_url" value="https://ateamutah.com/pages/property-manager-maintenance-request">
          <input type="hidden" name="service_category" value="Property Management & Maintenance">
          <input type="hidden" name="lead_source" value="website_form">
          <input type="hidden" name="utm_source" value="">
          <input type="hidden" name="utm_medium" value="">
          <input type="hidden" name="utm_campaign" value="">
          <input type="hidden" name="utm_content" value="">
          <input type="hidden" name="utm_term" value="">
          <input type="hidden" name="gclid" value="">
          <input type="hidden" name="gbraid" value="">
          <input type="hidden" name="wbraid" value="">
          <textarea name="starting_text_message" hidden>Hi ____, this is A Team Property Improvement. We received your property maintenance request and are reviewing the details. We will follow up with next steps, timing, and any approval questions.</textarea>
          <input type="hidden" name="redirect" value="https://ateamutah.com/pages/thank-you">
          <div class="contact-honey" aria-hidden="true" hidden>
            <label for="maintenance-request-guard">Leave this field empty</label>
            <input id="maintenance-request-guard" type="text" name="botcheck" tabindex="-1" autocomplete="off" inputmode="none" data-lpignore="true" data-form-type="other">
          </div>

          <div class="maintenance-form-group">
            <h3>Requester</h3>
            <div class="maintenance-form-grid">
              <label for="request-company">Company or property group
                <input id="request-company" name="company_name" autocomplete="organization" required>
              </label>
              <label for="request-first-name">First name
                <input id="request-first-name" name="first_name" autocomplete="given-name" required>
              </label>
              <label for="request-last-name">Last name
                <input id="request-last-name" name="last_name" autocomplete="family-name" required>
              </label>
              <label for="request-phone">Phone
                <input id="request-phone" name="phone" autocomplete="tel" inputmode="tel">
              </label>
              <label for="request-email">Email
                <input id="request-email" type="email" name="email" autocomplete="email">
              </label>
              <label for="request-contact-method">Preferred contact
                <select id="request-contact-method" name="preferred_contact_method">
                  <option value="">Select one</option>
                  <option>Text</option>
                  <option>Call</option>
                  <option>Email</option>
                </select>
              </label>
            </div>
          </div>

          <div class="maintenance-form-group">
            <h3>Property</h3>
            <div class="maintenance-form-grid">
              <label for="request-address" class="maintenance-form-grid__wide">Service address and unit
                <input id="request-address" name="project_address" autocomplete="street-address">
              </label>
              <label for="request-city">City
                <input id="request-city" name="project_city" autocomplete="address-level2">
              </label>
              <label for="request-state">State
                <input id="request-state" name="project_state" autocomplete="address-level1" value="UT">
              </label>
              <label for="request-zip">ZIP
                <input id="request-zip" name="project_zip" autocomplete="postal-code" inputmode="numeric">
              </label>
              <label for="request-property-type">Property type
                <select id="request-property-type" name="property_type">
                  <option value="">Select one</option>
                  <option>Single-family rental</option>
                  <option>Townhome or condo</option>
                  <option>Apartment or multi-unit</option>
                  <option>Commercial property</option>
                  <option>Other</option>
                </select>
              </label>
              <label for="request-tenant-status">Tenant status
                <select id="request-tenant-status" name="tenant_status">
                  <option value="">Select one</option>
                  <option>Tenant occupied</option>
                  <option>Vacant</option>
                  <option>Turnover in progress</option>
                  <option>Owner occupied</option>
                </select>
              </label>
            </div>
          </div>

          <div class="maintenance-form-group">
            <h3>Request</h3>
            <div class="maintenance-form-grid">
              <label for="request-type">Request type
                <select id="request-type" name="request_type" required>
                  <option value="">Select one</option>
                  <option>Repair request</option>
                  <option>Turnover punch list</option>
                  <option>Drywall, trim, or paint touch-up</option>
                  <option>Door, hardware, or fixture issue</option>
                  <option>Exterior maintenance</option>
                  <option>Inspection follow-up</option>
                  <option>Other maintenance</option>
                </select>
              </label>
              <label for="request-urgency">Urgency
                <select id="request-urgency" name="urgency" required>
                  <option value="">Select one</option>
                  <option>Urgent - call first</option>
                  <option>Same week if possible</option>
                  <option>Next 1-2 weeks</option>
                  <option>Flexible</option>
                </select>
              </label>
              <label for="request-timeline">Preferred timing
                <select id="request-timeline" name="preferred_timeline">
                  <option value="">Select one</option>
                  <option>Today if available</option>
                  <option>This week if available</option>
                  <option>Next 1-2 weeks</option>
                  <option>Before move-in or inspection date</option>
                  <option>Flexible</option>
                </select>
              </label>
              <label for="request-approval-limit">Approval limit
                <select id="request-approval-limit" name="authorization_limit">
                  <option value="">Select one</option>
                  <option>Needs estimate before work</option>
                  <option>Approved up to $250</option>
                  <option>Approved up to $500</option>
                  <option>Approved up to $1,000</option>
                  <option>Use existing account terms</option>
                </select>
              </label>
              <label for="request-description" class="maintenance-form-grid__wide">Describe the maintenance issue
                <textarea id="request-description" name="project_description" rows="6" placeholder="Example: Unit B has a damaged bedroom door, loose towel bar, two drywall patches, and paint touch-up needed before the next tenant moves in." required></textarea>
              </label>
              <label for="request-access" class="maintenance-form-grid__wide">Access, tenant, lockbox, or parking notes
                <textarea id="request-access" name="entry_instructions" rows="4" placeholder="Example: Tenant prefers weekdays after 3 PM. Lockbox is on the back gate. Please text before arrival."></textarea>
              </label>
            </div>
          </div>

          <button type="submit" class="btn btn-primary">Submit maintenance request</button>
          <p class="maintenance-request-submit-note">Text photos to <a href="sms:+18014777526">(801) 477-7526</a> after submitting.</p>
        </form>
      </div>
    </section>
  </main>

  <div data-include="/pages/partials/social-follow.html"></div>
  <div data-include="/pages/partials/email-prompt.html"></div>
  <div data-include="/pages/partials/footer.html"></div>
</body>
</html>
